<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasio Feature Graphic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            padding: 20px;
        }

        .feature-graphic {
            width: 1024px;
            height: 500px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
        }

        /* Decorative elements - geometric patterns */
        .feature-graphic::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(245, 166, 35, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .feature-graphic::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(245, 166, 35, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Geometric decorations */
        .decoration {
            position: absolute;
            opacity: 0.1;
        }

        .decoration-1 {
            top: 40px;
            left: 60px;
            width: 60px;
            height: 60px;
            border: 3px solid #F5A623;
            transform: rotate(45deg);
        }

        .decoration-2 {
            bottom: 60px;
            right: 200px;
            width: 40px;
            height: 40px;
            background: #F5A623;
            border-radius: 50%;
        }

        .decoration-3 {
            top: 100px;
            right: 400px;
            width: 20px;
            height: 20px;
            background: #F5A623;
            transform: rotate(45deg);
        }

        .decoration-4 {
            bottom: 100px;
            left: 300px;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #F5A623, transparent);
        }

        .content {
            z-index: 10;
            max-width: 550px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #F5A623 0%, #e8941c 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 30px rgba(245, 166, 35, 0.3);
        }

        .app-name {
            font-size: 56px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            font-weight: 400;
            line-height: 1.4;
        }

        .tagline span {
            color: #F5A623;
            font-weight: 600;
        }

        .features {
            display: flex;
            gap: 30px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .feature-dot {
            width: 8px;
            height: 8px;
            background: #F5A623;
            border-radius: 50%;
        }

        .phone-mockup {
            z-index: 10;
            position: relative;
        }

        .phone {
            width: 220px;
            height: 440px;
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 36px;
            padding: 12px;
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(255, 255, 255, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: rotate(5deg) translateY(-20px);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #FAF7F2 0%, #f5f0e8 100%);
            border-radius: 28px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
        }

        .phone-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .phone-greeting {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }

        .phone-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .phone-search {
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-icon {
            width: 16px;
            height: 16px;
            border: 2px solid #999;
            border-radius: 50%;
            position: relative;
        }

        .search-icon::after {
            content: '';
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 6px;
            height: 2px;
            background: #999;
            transform: rotate(45deg);
        }

        .search-text {
            font-size: 12px;
            color: #999;
        }

        .phone-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .phone-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .card-label {
            font-size: 9px;
            color: #F5A623;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .card-subtitle {
            font-size: 10px;
            color: #666;
        }

        .voice-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #F5A623 0%, #e8941c 100%);
            border-radius: 50%;
            margin: 16px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.4);
        }

        .mic-icon {
            width: 18px;
            height: 24px;
            background: white;
            border-radius: 9px;
            position: relative;
        }

        .mic-icon::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 12px;
            border: 2px solid white;
            border-top: none;
            border-radius: 0 0 12px 12px;
        }
    </style>
</head>
<body>
    <div class="feature-graphic">
        <!-- Decorative elements -->
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        <div class="decoration decoration-3"></div>
        <div class="decoration decoration-4"></div>

        <!-- Main content -->
        <div class="content">
            <div class="logo-container">
                <div class="app-icon">H</div>
                <div class="app-name">Hasio</div>
            </div>
            <div class="tagline">
                Your AI Travel Companion<br>
                for <span>Saudi Arabia</span>
            </div>
            <div class="features">
                <div class="feature">
                    <div class="feature-dot"></div>
                    <span>Voice Assistant</span>
                </div>
                <div class="feature">
                    <div class="feature-dot"></div>
                    <span>Smart Planning</span>
                </div>
                <div class="feature">
                    <div class="feature-dot"></div>
                    <span>Local Discovery</span>
                </div>
            </div>
        </div>

        <!-- Phone mockup -->
        <div class="phone-mockup">
            <div class="phone">
                <div class="phone-screen">
                    <div class="phone-header">
                        <div class="phone-greeting">Welcome to</div>
                        <div class="phone-title">Hasio</div>
                    </div>
                    <div class="phone-search">
                        <div class="search-icon"></div>
                        <span class="search-text">Where to next?</span>
                    </div>
                    <div class="phone-cards">
                        <div class="phone-card">
                            <div class="card-label">Featured</div>
                            <div class="card-title">Riyadh Season</div>
                            <div class="card-subtitle">Events & Entertainment</div>
                        </div>
                        <div class="phone-card">
                            <div class="card-label">Discover</div>
                            <div class="card-title">AlUla Heritage</div>
                            <div class="card-subtitle">Ancient wonders await</div>
                        </div>
                        <div class="phone-card">
                            <div class="card-label">Trending</div>
                            <div class="card-title">Red Sea Coast</div>
                            <div class="card-subtitle">Beach & Diving</div>
                        </div>
                    </div>
                    <div class="voice-btn">
                        <div class="mic-icon"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="downloadBtn" style="
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 30px;
        background: #F5A623;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        box-shadow: 0 4px 15px rgba(245, 166, 35, 0.4);
    ">Download PNG (1024x500)</button>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const element = document.querySelector('.feature-graphic');
            html2canvas(element, {
                width: 1024,
                height: 500,
                scale: 1,
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'hasio-feature-graphic.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
